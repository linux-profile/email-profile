[tox]
envlist =
    py38
    py39
    py310
    py311
    py312
    py313
    py314

[testenv]
setenv =
    PYTHONPATH = {toxinidir}
deps =
    pytest
    pytest-cov
    pytest-mock
    pydantic>=2.12
    sqlalchemy>=2.0
    dnspython>=2.6
    python-dotenv>=1.0
commands =
    pytest tests/ -v --tb=short

[testenv:py38]
basepython = python3.8

[testenv:py39]
basepython = python3.9

[testenv:py310]
basepython = python3.10

[testenv:py311]
basepython = python3.11

[testenv:py312]
basepython = python3.12

[testenv:py313]
basepython = python3.13

[testenv:py314]
basepython = python3.14
