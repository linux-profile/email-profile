repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        name: ruff (lint)
        args: [--config=.code_quality/ruff.toml, --fix]
        types: [python]
      - id: ruff-format
        name: ruff (format)
        args: [--config=.code_quality/ruff.toml]
        types: [python]

  - repo: local
    hooks:
      - id: pytest
        name: Run Unit Tests
        entry: poetry run pytest tests/ --tb=short -q
        language: system
        types: [python]
        files: ^(email_profile|tests)/
        pass_filenames: false
