<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420">
  <style>
    @keyframes blink { 0%,100% { opacity: 1 } 50% { opacity: 0 } }
    @keyframes bar1 { 0% { width: 0 } 100% { width: 280px } }
    @keyframes bar2 { 0% { width: 0 } 100% { width: 280px } }
    @keyframes bar3 { 0% { width: 0 } 100% { width: 280px } }
    @keyframes fade1 { 0%,59% { opacity: 0 } 60% { opacity: 1 } }
    @keyframes fade2 { 0%,74% { opacity: 0 } 75% { opacity: 1 } }
    @keyframes fade3 { 0%,89% { opacity: 0 } 90% { opacity: 1 } }
    @keyframes fadebar1 { 0%,19% { opacity: 0 } 20%,59% { opacity: 1 } 60% { opacity: 0 } }
    @keyframes fadebar2 { 0%,34% { opacity: 0 } 35%,74% { opacity: 1 } 75% { opacity: 0 } }
    @keyframes fadebar3 { 0%,49% { opacity: 0 } 50%,89% { opacity: 1 } 90% { opacity: 0 } }
    text { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; }
    .prompt { fill: #8b949e; }
    .cmd { fill: #c9d1d9; }
    .green { fill: #3fb950; }
    .cyan { fill: #58a6ff; }
    .dim { fill: #8b949e; }
    .bar-bg { fill: #30363d; rx: 2; }
    .bar-cyan { fill: #58a6ff; rx: 2; }
  </style>
  <rect width="720" height="420" rx="8" fill="#0d1117"/>
  <circle cx="20" cy="18" r="6" fill="#f85149"/>
  <circle cx="38" cy="18" r="6" fill="#e0a434"/>
  <circle cx="56" cy="18" r="6" fill="#3fb950"/>
  <text x="310" y="22" fill="#8b949e" font-size="12" text-anchor="middle">email-profile — restore</text>

  <!-- Command -->
  <text x="20" y="55" class="prompt">$</text>
  <text x="35" y="55" class="cmd">python docs_src/restore_inbox.py</text>

  <!-- Progress bar 1 -->
  <g style="animation: fadebar1 8s infinite">
    <text x="30" y="90" class="cyan">INBOX.Work</text>
    <rect x="200" y="78" width="280" height="14" class="bar-bg"/>
    <rect x="200" y="78" height="14" class="bar-cyan" style="animation: bar1 2s ease-out 1.5s both"/>
    <text x="490" y="90" class="dim">100%</text>
  </g>

  <!-- Done 1 -->
  <g style="animation: fade1 8s infinite">
    <text x="30" y="90" class="green">✓</text>
    <text x="50" y="90" class="cmd">INBOX.Work — 45 uploaded, 0 skipped</text>
  </g>

  <!-- Progress bar 2 -->
  <g style="animation: fadebar2 8s infinite">
    <text x="30" y="115" class="cyan">INBOX.Sent</text>
    <rect x="200" y="103" width="280" height="14" class="bar-bg"/>
    <rect x="200" y="103" height="14" class="bar-cyan" style="animation: bar2 2s ease-out 2.5s both"/>
    <text x="490" y="115" class="dim">100%</text>
  </g>

  <!-- Done 2 -->
  <g style="animation: fade2 8s infinite">
    <text x="30" y="115" class="green">✓</text>
    <text x="50" y="115" class="cmd">INBOX.Sent — 41 uploaded, 0 skipped</text>
  </g>

  <!-- Progress bar 3 -->
  <g style="animation: fadebar3 8s infinite">
    <text x="30" y="140" class="cyan">INBOX</text>
    <rect x="200" y="128" width="280" height="14" class="bar-bg"/>
    <rect x="200" y="128" height="14" class="bar-cyan" style="animation: bar3 3s ease-out 3.5s both"/>
    <text x="490" y="140" class="dim">100%</text>
  </g>

  <!-- Done 3 -->
  <g style="animation: fade3 8s infinite">
    <text x="30" y="140" class="green">✓</text>
    <text x="50" y="140" class="cmd">INBOX — 23455 uploaded, 0 skipped</text>
  </g>

  <!-- Final -->
  <g style="animation: fade3 8s infinite">
    <text x="20" y="180" class="cmd">Restored 23541 messages</text>
    <text x="20" y="210" class="prompt">$</text>
    <rect x="35" y="199" width="8" height="14" fill="#c9d1d9" style="animation: blink 1s step-end infinite"/>
  </g>
</svg>
